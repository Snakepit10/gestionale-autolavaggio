# =====================================================================
# Broker MQTT Autolavaggio MasterWash - Mosquitto 2.x
#
# Deployato su Railway come servizio Docker (vedi Dockerfile + README).
# - I dispositivi (Shelly, Waveshare) entrano dal TCP Proxy pubblico
#   di Railway; il CRM entra dalla rete privata interna.
# - Autenticazione obbligatoria: il file passwd viene scritto all'avvio
#   dall'entrypoint a partire dalla variabile d'ambiente MOSQUITTO_PASSWD
#   (righe utente:hash generate in locale con mosquitto_passwd).
# =====================================================================

# Listener MQTT standard su tutte le interfacce del container.
# NIENTE bind address esplicito: cosi' Mosquitto ascolta sia IPv4 che
# IPv6. Fondamentale su Railway: la rete privata (*.railway.internal)
# e' SOLO IPv6, con "0.0.0.0" il CRM non raggiungerebbe mai il broker.
listener 1883

# Niente accessi anonimi: ogni client (nodo_pista2, nodo_portale1,
# crm, debug) ha il suo utente nel file passwd
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistenza di sessioni e messaggi retained sul volume Railway
# montato in /mosquitto/data
persistence true
persistence_location /mosquitto/data/

# Log su stdout: finiscono direttamente nei log del servizio Railway
log_dest stdout
log_type error
log_type warning
log_type notice
# Utile in collaudo: logga connessioni/disconnessioni dei client
connection_messages true
